---
services:
    backend:
        image: harbor.status.im/bi/status-backend:dev
        container_name: status-backend
        ports:
            - 8080:8080
            - 8545:8545
            - 30303:30303
        entrypoint: 'status-backend'
        command: '-address 0.0.0.0:8080'
        volumes:
            - ./backups:/root/.config/Status/backups
        networks:
            - status-bridge
        healthcheck:
            test: ["CMD", "curl http://0.0.0.0:8080/health"]

    bot:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: status-monitor
        depends_on:
            - backend
            - database
        volumes:
            - ./accounts:/app/accounts
        env_file:
            - .env
        networks:
            - status-bridge

    database:
        image: postgres:15
        container_name: database
        env_file:
            - .env
        ports:
            - 5432:5432
        volumes:
            - postgres-data:/var/lib/postgresql
        networks:
            - status-bridge
        healthcheck:
            test: ["CMD-SHELL", "pg_isready POSTGRES_USERNAME --dbname POSTGRES_DATABASE"]

networks:
    status-bridge:
        name: status-bridge
        driver: bridge

volumes:
    postgres-data:
